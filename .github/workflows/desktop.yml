# Builds the Clinical Reference desktop apps (macOS .dmg, Windows .exe,
# Linux .AppImage) with Tauri.
#
# How to run it:
#   1. This file must live at .github/workflows/desktop.yml on the `main`
#      branch of the repository (commit it there if it is missing).
#   2. Open the repo's "Actions" tab. "Build desktop apps" then appears in
#      the left-hand list of workflows.
#   3. Click it, then click the "Run workflow" button (top right), choose
#      the `main` branch, and confirm.
#   4. When the run finishes (~15-25 min), open the run and download the
#      installers from the "Artifacts" section at the bottom of the page.

name: Build desktop apps

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          - platform: windows-latest
            args: ""
            rust-targets: ""
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache the Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Stage the web app as the Tauri frontend
        shell: bash
        run: |
          rm -rf frontend
          mkdir -p frontend
          cp -r index.html assets manifest.webmanifest service-worker.js frontend/

      - name: Install the Tauri CLI
        run: npm install

      - name: Build the desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

      - name: Upload the installers
        uses: actions/upload-artifact@v4
        with:
          name: clinical-reference-${{ matrix.platform }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/universal-apple-darwin/release/bundle/**
